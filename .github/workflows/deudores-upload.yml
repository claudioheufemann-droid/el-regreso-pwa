name: Deudores Upload - 2x Daily

on:
  schedule:
    # 9:00 AM Chile Time (15:00 UTC during DST, 16:00 UTC standard)
    - cron: '0 15 * * *'
    # 5:00 PM Chile Time (21:00 UTC during DST, 22:00 UTC standard)
    - cron: '0 21 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  upload-deudores:
    runs-on: ubuntu-latest

    steps:
      - name: Check cron environment
        run: |
          echo "Workflow triggered by: ${{ github.event_name }}"
          echo "Event: ${{ toJson(github.event) }}"

      - name: Upload deudores to production
        run: |
          # Download Excel file from your source
          # Option 1: From a URL (e.g., Google Drive, Dropbox, etc.)
          # Replace with your actual file URL

          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.DEUDORES_CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{
              "file_url": "${{ secrets.DEUDORES_FILE_URL }}"
            }' \
            https://tu-app.vercel.app/api/deudores/cron-upload
        env:
          # Set in GitHub Secrets:
          # DEUDORES_CRON_SECRET: your-secret-token
          # DEUDORES_FILE_URL: https://your-server.com/deudores.xlsx
          SECRET: ${{ secrets.DEUDORES_CRON_SECRET }}
          FILE_URL: ${{ secrets.DEUDORES_FILE_URL }}

      - name: Handle failure
        if: failure()
        run: |
          echo "Upload failed! Check the logs above."
          exit 1

  # Optional: Send notification
  notify:
    runs-on: ubuntu-latest
    needs: upload-deudores
    if: always()

    steps:
      - name: Notify on success
        if: needs.upload-deudores.result == 'success'
        run: |
          echo "✅ Deudores uploaded successfully"
          # Add your notification logic here (Slack, Discord, email, etc.)

      - name: Notify on failure
        if: needs.upload-deudores.result == 'failure'
        run: |
          echo "❌ Deudores upload failed"
          # Add your failure notification logic here
